; ota-common: framework-agnostic C++17 core shared by the LoRa loader
; (firmware-ota-lora) and main firmware (Path B). This project file exists only
; to build and run the host-native unit test suite via PlatformIO:
;
;     pio test -e native
;
; The library itself is consumed by the firmware builds via library.json, not
; built standalone for a target here.

[platformio]
include_dir = include
src_dir = src

[env:native]
platform = native
build_flags =
    -std=c++17
    -Wall
    -Wextra
    -Iinclude
    ; Absolute path to the cross-language fixtures (used by test_fixtures).
    -DOTA_FIXTURES_DIR=\"${PROJECT_DIR}/test/fixtures\"
build_unflags = -std=gnu++11
; Unity is the PlatformIO-bundled test framework.
test_framework = unity
; Compile the library sources in src/ into every test program (they have no
; main() of their own; each test provides one).
test_build_src = yes
